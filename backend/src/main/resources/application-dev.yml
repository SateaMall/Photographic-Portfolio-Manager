spring:
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  datasource:
    url: jdbc:h2:mem:photo_gallery;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:


  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

server:
  tomcat:
    max-http-form-post-size: 15MB
    max-swallow-size: 15MB

app:
  storage:
    type: local
    local:
      root-path: ./storage
