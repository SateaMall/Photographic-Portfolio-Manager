$kind: http-request
name: GET Countries
method: GET
url: '{{baseUrl}}/api/admin/countries'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Response is an array', function () {
        pm.expect(pm.response.json()).to.be.an('array');
      });
