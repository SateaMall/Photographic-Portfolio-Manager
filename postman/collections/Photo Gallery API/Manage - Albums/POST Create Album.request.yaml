$kind: http-request
name: POST Create Album
method: POST
url: "{{baseUrl}}/api/manage/albums?slug=satea&title=Homs's
  Saler&description=bla bla bla lba"
order: 1000
queryParams:
  - key: slug
    value: satea
    description: Profile slug
  - key: title
    value: Homs's Saler
    description: Album title
  - key: description
    value: bla bla bla lba
    description: Optional description
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Response has id', function () {
        var json = pm.response.json();
        pm.expect(json).to.have.property('id');
      });
    language: text/javascript
