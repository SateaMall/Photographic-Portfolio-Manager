$kind: http-request
name: POST Add Photo to Album
method: POST
url: '{{baseUrl}}/api/manage/albums/{{albumId}}/photos/{{photoId}}'
order: 3000
queryParams:
  - key: position
    value: ''
    description: Optional position
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 204', function () {
        pm.response.to.have.status(204);
      });
