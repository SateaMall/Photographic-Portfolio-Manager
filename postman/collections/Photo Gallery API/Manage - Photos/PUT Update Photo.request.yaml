$kind: http-request
name: PUT Update Photo
method: PUT
url: '{{baseUrl}}/api/manage/photos/{{photoId}}'
order: 2000
queryParams:
  - key: title
    value: Updated Title
  - key: description
    value: ''
    description: Optional description
scripts:
