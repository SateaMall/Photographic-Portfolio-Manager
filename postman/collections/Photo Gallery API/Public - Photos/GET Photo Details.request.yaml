$kind: http-request
name: GET Photo Details
method: GET
url: '{{baseUrl}}/api/public/profiles/{{profileSlug}}/photos/{{photoId}}'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });
