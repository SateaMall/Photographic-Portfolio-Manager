$kind: http-request
name: GET Photos
method: GET
url: '{{baseUrl}}/api/public/profiles/{{profileSlug}}/photos'
order: 1000
queryParams:
  - key: page
    value: '0'
  - key: size
    value: '20'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Response has content array', function () {
        var json = pm.response.json();
        pm.expect(json).to.have.property('content');
        pm.expect(json.content).to.be.an('array');
      });
